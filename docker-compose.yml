version: '3.8'

services:
  stage-server-1:
    build: .
    ports:
      - "3000:3000"
    environment:
      PORT: "3000"
      STAGE_ID: "1"
      STAGE_NAME: "Main Stage"
      CENTRAL_WS_URL: "ws://central-server:8080/ws-native"

  stage-server-2:
    build: .
    ports:
      - "3001:3001" # Notice the port changed to 3001!
    environment:
      PORT: "3001"
      STAGE_ID: "2"
      STAGE_NAME: "Second Stage"
      CENTRAL_WS_URL: "ws://central-server:8080/ws-native"

  stage-server-3:
    build: .
    ports:
      - "3002:3002" # Notice the port changed to 3002!
    environment:
      PORT: "3002"
      STAGE_ID: "3"
      STAGE_NAME: "Third Stage"
      CENTRAL_WS_URL: "ws://central-server:8080/ws-native"